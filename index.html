<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wemayvin</title>
    <meta name="description" content="We make apps.">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --border: #eaeaea;
            --card-bg: #fafafa;
            --accent: #1a1a1a;
            --max-width: 1040px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }

        a { color: inherit; text-decoration: none; }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Nav */
        .nav {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--text);
            color: #ffffff;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        /* Hero */
        .hero {
            padding: 96px 0 56px;
            text-align: center;
        }
        .hero h1 {
            font-size: clamp(2.25rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0 0 16px;
        }
        .hero p {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin: 0;
        }

        /* Apps grid */
        .apps {
            padding: 48px 0 96px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* App card */
        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 48px;
            align-items: center;
        }
        .app-info {
            min-width: 0;
        }
        .app-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            flex-shrink: 0;
        }
        .app-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0;
        }
        .app-desc {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0 0 28px;
            max-width: 44ch;
        }

        /* Store buttons */
        .store-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: var(--accent);
            color: #ffffff;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .store-btn:hover {
            transform: translateY(-1px);
            opacity: 0.92;
        }
        .store-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .store-btn svg.icon-apple {
            width: 20px;
            height: 20px;
        }

        /* App meta (privacy etc.) */
        .app-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .app-meta a {
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .app-meta a:hover { color: var(--text); }

        /* Screenshot */
        .app-visual {
            width: 260px;
            display: flex;
            justify-content: center;
        }
        .app-visual img {
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .footer a:hover { color: var(--text); }

        /* Responsive */
        @media (max-width: 768px) {
            .hero { padding: 64px 0 32px; }
            .app-card {
                grid-template-columns: 1fr;
                padding: 32px 24px;
                gap: 32px;
                text-align: center;
            }
            .app-header { justify-content: center; }
            .app-desc { margin-left: auto; margin-right: auto; }
            .store-buttons { justify-content: center; }
            .app-visual {
                width: 220px;
                margin: 0 auto;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <header class="nav">
        <div class="container nav-inner">
            <a class="logo" href="/">
                <span class="logo-mark" aria-hidden="true">wmv</span>
                <span>wemayvin</span>
            </a>
        </div>
    </header>

    <main>
        <section class="hero">

        <section class="apps">
            <div class="container">

                        <div class="store-buttons">
                            <a class="store-btn" href="https://apps.apple.com/app/todoit/id6742044928" aria-label="Download toDoit on the App Store">
                                <svg class="icon-apple" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.41-1.09-.47-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.41C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                                App Store
                            </a>
                            <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.wemayvin.todoit" aria-label="Get toDoit on Google Play">
                                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3.6 2.3c-.4.3-.6.8-.6 1.4v16.6c0 .6.2 1.1.6 1.4l9.1-9.7L3.6 2.3zm10.2 10.4L5.1 21.8c.3.1.6.2.9.2.3 0 .7-.1 1-.3l10.4-5.9-3.6-3.1zm6.5-3.4L17 7.5l-3.2 3.4 3.2 3.4 3.3-1.9c1.1-.6 1.1-2.2 0-2.8zM5.1 2.2L13.8 11l2.5-2.7L6.1 2.5c-.3-.2-.7-.3-1-.3z"/></svg>
                                Google Play
                            </a>
                        </div>

                        <div class="app-meta">
                            <a href="privacy/todoit.html">Privacy Policy</a>
                        </div>
                    </div>

                    <div class="app-visual">
                        <img src="assets/todoit-screen.png" alt="toDoit app screenshot">
                    </div>
                </article>

                  다음 앱이 출시되면 아래 템플릿을 복사해서 추가하세요.

                          </div>
                          <p class="app-desc">{한 줄 설명}</p>
                          <div class="store-buttons">
                              <a class="store-btn" href="#">App Store</a>

                              <a href="privacy/{APP}.html">Privacy Policy</a>
                          </div>
                      </div>
                      <div class="app-visual">
                          <img src="assets/{APP}-screen.png" alt="{APP} app screenshot">
                      </div>
                  </article>
                -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <div>© 2026 wemayvin</div>
            <div>
                <a href="mailto:we.may.vin@gmail.com">Contact</a>
            </div>
        </div>
    </footer>
</body>
</html>
